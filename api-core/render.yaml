services:
  - type: web
    name: wisermedia-pdf-quiz
    env: node
    plan: starter
    rootDir: api-core
    buildCommand: npm install && npm run build
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
