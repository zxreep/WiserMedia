<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF to CUET Quiz</title>
    <style>
      body { font-family: Inter, Arial, sans-serif; background: #f6f8fb; margin: 0; }
      .container { max-width: 900px; margin: 40px auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.08); }
      h1 { margin-top: 0; }
      label { display:block; margin-top: 12px; font-weight: 600; }
      input, select, button { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #d0d7e2; margin-top: 6px; }
      button { background: #2b65ff; border: none; color: white; font-weight: 700; cursor: pointer; margin-top: 16px; }
      button:disabled { opacity: .6; cursor: wait; }
      .status { margin-top: 14px; padding: 10px; border-radius: 8px; }
      .loading { background: #eef4ff; color: #1e4abf; }
      .success { background: #eafaf0; color: #147a37; }
      .error { background: #ffeef0; color: #b42318; }
      pre { background:#0f172a; color:#e2e8f0; padding:12px; overflow:auto; border-radius:8px; }
      .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top: 12px; }
      @media (max-width: 820px) { .grid { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>PDF → CUET Notes & Quiz (NVIDIA API)</h1>
      <form id="quiz-form">
        <label>PDF File</label>
        <input id="pdf" type="file" accept="application/pdf" required />

        <label>NVIDIA API Key</label>
        <input id="aiApiKey" type="password" placeholder="nvapi-..." required />

        <label>NVIDIA Model</label>
        <select id="aiModel" required>
          <option value="meta/llama-3.1-405b-instruct">meta/llama-3.1-405b-instruct</option>
          <option value="meta/llama-3.1-70b-instruct">meta/llama-3.1-70b-instruct</option>
          <option value="meta/llama-3.1-8b-instruct">meta/llama-3.1-8b-instruct</option>
          <option value="mistralai/mixtral-8x7b-instruct-v0.1">mistralai/mixtral-8x7b-instruct-v0.1</option>
          <option value="google/gemma-2-27b-it">google/gemma-2-27b-it</option>
        </select>

        <label>Telegram Bot Token</label>
        <input id="botToken" placeholder="123456:ABC..." />

        <label>Telegram Chat ID</label>
        <input id="chatId" placeholder="-100123... or user id" />

        <label>Output Mode</label>
        <select id="outputMode">
          <option value="telegram">Telegram Polls</option>
          <option value="json">JSON output</option>
        </select>

        <button id="submitBtn" type="submit">Generate Quiz</button>
      </form>
      <div id="status"></div>
      <div class="grid">
        <div>
          <h3>Result</h3>
          <pre id="result"></pre>
        </div>
        <div>
          <h3>Logs</h3>
          <pre id="logs"></pre>
        </div>
      </div>
    </div>

    <script>
      const storageKey = 'wm_pdf_quiz_creds_v1';
      const statusEl = document.getElementById('status');
      const resultEl = document.getElementById('result');
      const logsEl = document.getElementById('logs');
      const form = document.getElementById('quiz-form');
      const submitBtn = document.getElementById('submitBtn');

      const saved = JSON.parse(localStorage.getItem(storageKey) || '{}');
      for (const key of ['botToken', 'chatId', 'aiApiKey', 'aiModel', 'outputMode']) {
        if (saved[key]) document.getElementById(key).value = saved[key];
      }

      const now = () => new Date().toISOString();
      const addLog = (message, payload) => {
        const line = payload ? `[${now()}] ${message} :: ${JSON.stringify(payload)}` : `[${now()}] ${message}`;
        logsEl.textContent = `${logsEl.textContent}${line}\n`;
        logsEl.scrollTop = logsEl.scrollHeight;
      };

      const setStatus = (type, msg) => {
        statusEl.className = `status ${type}`;
        statusEl.textContent = msg;
        addLog(`status:${type}`, { msg });
      };

      const parseResponse = async (res, tag) => {
        const text = await res.text();
        let json;
        try {
          json = text ? JSON.parse(text) : {};
        } catch {
          json = { raw: text };
        }
        addLog(`${tag} response`, { status: res.status, ok: res.ok, body: json });
        return json;
      };

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const pdf = document.getElementById('pdf').files[0];
        const botToken = document.getElementById('botToken').value.trim();
        const chatId = document.getElementById('chatId').value.trim();
        const aiApiKey = document.getElementById('aiApiKey').value.trim();
        const aiModel = document.getElementById('aiModel').value;
        const outputMode = document.getElementById('outputMode').value;

        localStorage.setItem(storageKey, JSON.stringify({ botToken, chatId, aiApiKey, aiModel, outputMode }));
        resultEl.textContent = '';
        logsEl.textContent = '';

        addLog('form submitted', {
          hasPdf: !!pdf,
          outputMode,
          aiModel,
          hasBotToken: !!botToken,
          hasChatId: !!chatId,
          hasAiApiKey: !!aiApiKey
        });

        if (!pdf) return setStatus('error', 'Please upload a PDF file.');
        if (!aiApiKey) return setStatus('error', 'NVIDIA API key is required.');
        if (!aiModel) return setStatus('error', 'Please select an NVIDIA model.');
        if (outputMode === 'telegram' && (!botToken || !chatId)) {
          return setStatus('error', 'Telegram bot token and chat ID are required for Telegram mode.');
        }

        submitBtn.disabled = true;
        try {
          setStatus('loading', 'Uploading PDF...');
          const formData = new FormData();
          formData.append('file', pdf);
          addLog('calling /pdf-quiz/upload-pdf', { fileName: pdf.name, size: pdf.size });
          const uploadRes = await fetch('/pdf-quiz/upload-pdf', { method: 'POST', body: formData });
          const uploadData = await parseResponse(uploadRes, 'upload');
          if (!uploadRes.ok) throw new Error(uploadData.error || 'Upload failed');

          setStatus('loading', 'Processing chunks...');
          addLog('calling /pdf-quiz/process-pdf', { uploadId: uploadData.data.uploadId });
          const processRes = await fetch('/pdf-quiz/process-pdf', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uploadId: uploadData.data.uploadId })
          });
          const processData = await parseResponse(processRes, 'process');
          if (!processRes.ok) throw new Error(processData.error || 'Process failed');

          setStatus('loading', 'Generating notes and CUET quiz...');
          addLog('calling /pdf-quiz/generate-quiz', {
            uploadId: uploadData.data.uploadId,
            outputMode,
            aiModel,
            chunkCount: processData?.data?.chunkCount
          });
          const genRes = await fetch('/pdf-quiz/generate-quiz', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uploadId: uploadData.data.uploadId, aiApiKey, aiModel, outputMode, botToken, chatId })
          });
          const genData = await parseResponse(genRes, 'generate');
          if (!genRes.ok) throw new Error(genData.error || 'Generation failed');

          setStatus('success', outputMode === 'telegram' ? 'Quiz generated and sent to Telegram.' : 'Quiz generated successfully.');
          resultEl.textContent = JSON.stringify(genData, null, 2);
        } catch (err) {
          addLog('caught error', { message: err.message, stack: err.stack });
          setStatus('error', err.message || 'Something went wrong');
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
