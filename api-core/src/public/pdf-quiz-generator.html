<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF to CUET Quiz</title>
    <style>
      body { font-family: Inter, Arial, sans-serif; background: #f6f8fb; margin: 0; }
      .container { max-width: 900px; margin: 40px auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.08); }
      h1 { margin-top: 0; }
      label { display:block; margin-top: 12px; font-weight: 600; }
      input, select, button, textarea { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #d0d7e2; margin-top: 6px; }
      button { background: #2b65ff; border: none; color: white; font-weight: 700; cursor: pointer; margin-top: 16px; }
      button:disabled { opacity: .6; cursor: wait; }
      .status { margin-top: 14px; padding: 10px; border-radius: 8px; }
      .loading { background: #eef4ff; color: #1e4abf; }
      .success { background: #eafaf0; color: #147a37; }
      .error { background: #ffeef0; color: #b42318; }
      pre { background:#0f172a; color:#e2e8f0; padding:12px; overflow:auto; border-radius:8px; }
      .grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top: 12px; }
      .section { border-top: 1px solid #e5e7eb; margin-top: 24px; padding-top: 20px; }
      @media (max-width: 820px) { .grid { grid-template-columns:1fr; } }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>PDF → CUET Notes & Quiz (NVIDIA API)</h1>
      <form id="quiz-form">
        <label>PDF File</label>
        <input id="pdf" type="file" accept="application/pdf" required />

        <label>NVIDIA API Key</label>
        <input id="aiApiKey" type="password" placeholder="nvapi-..." required />

        <label>NVIDIA Model</label>
        <select id="aiModel" required>
          <option value="meta/llama-3.1-405b-instruct">meta/llama-3.1-405b-instruct</option>
          <option value="meta/llama-3.1-70b-instruct">meta/llama-3.1-70b-instruct</option>
          <option value="meta/llama-3.1-8b-instruct">meta/llama-3.1-8b-instruct</option>
          <option value="mistralai/mixtral-8x7b-instruct-v0.1">mistralai/mixtral-8x7b-instruct-v0.1</option>
          <option value="google/gemma-2-27b-it">google/gemma-2-27b-it</option>
        </select>

        <label>Telegram Bot Token</label>
        <input id="botToken" placeholder="123456:ABC..." />

        <label>Telegram Chat ID</label>
        <input id="chatId" placeholder="-100123... or user id" />

        <label>Output Mode</label>
        <select id="outputMode">
          <option value="telegram">Telegram Polls</option>
          <option value="json">JSON output</option>
        </select>

        <button id="submitBtn" type="submit">Generate Quiz from PDF</button>
      </form>

      <div class="section">
        <h3>Add Quiz via JSON (server route)</h3>
        <form id="json-form">
          <label>Quiz JSON</label>
          <textarea id="quizJson" rows="10" placeholder='{"title":"...","questions":[...]}'></textarea>
          <button id="jsonSubmitBtn" type="submit">Add Quiz to Server</button>
        </form>
      </div>

      <div class="section">
        <h3>Admin Tasks Panel</h3>
        <label>Task Text</label>
        <textarea id="taskText" rows="3" placeholder="Paste any URL or instruction text..."></textarea>

        <label>Task ID (for update/delete)</label>
        <input id="taskId" type="text" placeholder="e.g. 2d4b7f77-..." />

        <label>Task Status</label>
        <input id="taskStatus" type="text" value="done" />

        <div class="grid">
          <button id="taskCreateBtn" type="button">Create Task</button>
          <button id="taskDoneBtn" type="button">Mark Done</button>
          <button id="taskDeleteBtn" type="button">Delete Task</button>
        </div>
      </div>

      <div id="status"></div>
      <div class="grid">
        <div>
          <h3>Result</h3>
          <pre id="result"></pre>
        </div>
        <div>
          <h3>Logs</h3>
          <pre id="logs"></pre>
        </div>
      </div>
    </div>

    <script>
      const API_BASE = '/pdf-quiz';
      const storageKey = 'wm_pdf_quiz_creds_v1';
      const statusEl = document.getElementById('status');
      const resultEl = document.getElementById('result');
      const logsEl = document.getElementById('logs');
      const form = document.getElementById('quiz-form');
      const jsonForm = document.getElementById('json-form');
      const submitBtn = document.getElementById('submitBtn');
      const jsonSubmitBtn = document.getElementById('jsonSubmitBtn');
      const taskCreateBtn = document.getElementById('taskCreateBtn');
      const taskDoneBtn = document.getElementById('taskDoneBtn');
      const taskDeleteBtn = document.getElementById('taskDeleteBtn');

      const saved = JSON.parse(localStorage.getItem(storageKey) || '{}');
      for (const key of ['botToken', 'chatId', 'aiApiKey', 'aiModel', 'outputMode']) {
        if (saved[key]) document.getElementById(key).value = saved[key];
      }

      const now = () => new Date().toISOString();
      const addLog = (message, payload) => {
        const line = payload ? `[${now()}] ${message} :: ${JSON.stringify(payload)}` : `[${now()}] ${message}`;
        logsEl.textContent = `${logsEl.textContent}${line}\n`;
        logsEl.scrollTop = logsEl.scrollHeight;
      };

      const setStatus = (type, msg) => {
        statusEl.className = `status ${type}`;
        statusEl.textContent = msg;
        addLog(`status:${type}`, { msg });
      };

      const parseResponse = async (res, tag) => {
        const text = await res.text();
        let json;
        try {
          json = text ? JSON.parse(text) : {};
        } catch {
          json = { raw: text };
        }
        addLog(`${tag} response`, { status: res.status, ok: res.ok, body: json });
        return json;
      };

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const pdf = document.getElementById('pdf').files[0];
        const botToken = document.getElementById('botToken').value.trim();
        const chatId = document.getElementById('chatId').value.trim();
        const aiApiKey = document.getElementById('aiApiKey').value.trim();
        const aiModel = document.getElementById('aiModel').value;
        const outputMode = document.getElementById('outputMode').value;

        localStorage.setItem(storageKey, JSON.stringify({ botToken, chatId, aiApiKey, aiModel, outputMode }));
        resultEl.textContent = '';
        logsEl.textContent = '';

        if (!pdf) return setStatus('error', 'Please upload a PDF file.');
        if (!aiApiKey) return setStatus('error', 'NVIDIA API key is required.');
        if (!aiModel) return setStatus('error', 'Please select an NVIDIA model.');
        if (outputMode === 'telegram' && (!botToken || !chatId)) {
          return setStatus('error', 'Telegram bot token and chat ID are required for Telegram mode.');
        }

        submitBtn.disabled = true;
        try {
          setStatus('loading', 'Uploading PDF...');
          const formData = new FormData();
          formData.append('file', pdf);
          const uploadRes = await fetch(`${API_BASE}/upload-pdf`, { method: 'POST', body: formData });
          const uploadData = await parseResponse(uploadRes, 'upload');
          if (!uploadRes.ok) throw new Error(uploadData.error || 'Upload failed');

          const processRes = await fetch(`${API_BASE}/process-pdf`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uploadId: uploadData.data.uploadId })
          });
          const processData = await parseResponse(processRes, 'process');
          if (!processRes.ok) throw new Error(processData.error || 'Process failed');

          const genRes = await fetch(`${API_BASE}/generate-quiz`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uploadId: uploadData.data.uploadId, aiApiKey, aiModel, outputMode, botToken, chatId })
          });
          const genData = await parseResponse(genRes, 'generate');
          if (!genRes.ok) throw new Error(genData.error || 'Generation failed');

          setStatus('success', outputMode === 'telegram' ? 'Quiz generated and sent to Telegram.' : 'Quiz generated successfully.');
          resultEl.textContent = JSON.stringify(genData, null, 2);
        } catch (err) {
          addLog('caught error', { message: err.message, stack: err.stack });
          setStatus('error', err.message || 'Something went wrong');
        } finally {
          submitBtn.disabled = false;
        }
      });

      jsonForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        resultEl.textContent = '';
        const raw = document.getElementById('quizJson').value.trim();
        if (!raw) return setStatus('error', 'Please paste quiz JSON first.');

        let payload;
        try {
          payload = JSON.parse(raw);
        } catch {
          return setStatus('error', 'Invalid JSON format.');
        }

        jsonSubmitBtn.disabled = true;
        try {
          setStatus('loading', 'Adding quiz JSON via server route...');
          const resp = await fetch(`${API_BASE}/add-quiz-json`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          const data = await parseResponse(resp, 'add-quiz-json');
          if (!resp.ok) throw new Error(data.error || 'Failed to add quiz');
          setStatus('success', 'Quiz added successfully.');
          resultEl.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          addLog('caught error', { message: err.message, stack: err.stack });
          setStatus('error', err.message || 'Failed to add quiz');
        } finally {
          jsonSubmitBtn.disabled = false;
        }
      });

      taskCreateBtn.addEventListener('click', async () => {
        const task = document.getElementById('taskText').value.trim();
        if (!task) return setStatus('error', 'Task text is required.');

        taskCreateBtn.disabled = true;
        try {
          setStatus('loading', 'Creating task...');
          const resp = await fetch('/tasks', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ task })
          });
          const data = await parseResponse(resp, 'tasks-create');
          if (!resp.ok) throw new Error(data.error || 'Failed to create task');
          document.getElementById('taskId').value = data?.data?.id ?? '';
          setStatus('success', 'Task created.');
          resultEl.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          setStatus('error', err.message || 'Failed to create task');
        } finally {
          taskCreateBtn.disabled = false;
        }
      });

      taskDoneBtn.addEventListener('click', async () => {
        const taskId = document.getElementById('taskId').value.trim();
        const status = document.getElementById('taskStatus').value.trim() || 'done';
        if (!taskId) return setStatus('error', 'Task ID is required to update status.');

        taskDoneBtn.disabled = true;
        try {
          setStatus('loading', 'Updating task status...');
          const resp = await fetch(`/tasks?taskid=${encodeURIComponent(taskId)}&status=${encodeURIComponent(status)}`);
          const data = await parseResponse(resp, 'tasks-update');
          if (!resp.ok) throw new Error(data.error || 'Failed to update task');
          setStatus('success', 'Task status updated.');
          resultEl.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          setStatus('error', err.message || 'Failed to update task');
        } finally {
          taskDoneBtn.disabled = false;
        }
      });

      taskDeleteBtn.addEventListener('click', async () => {
        const taskId = document.getElementById('taskId').value.trim();
        if (!taskId) return setStatus('error', 'Task ID is required to delete.');

        taskDeleteBtn.disabled = true;
        try {
          setStatus('loading', 'Deleting task...');
          const resp = await fetch(`/tasks?taskid=${encodeURIComponent(taskId)}&action=delete`);
          const data = await parseResponse(resp, 'tasks-delete');
          if (!resp.ok) throw new Error(data.error || 'Failed to delete task');
          setStatus('success', 'Task deleted.');
          resultEl.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          setStatus('error', err.message || 'Failed to delete task');
        } finally {
          taskDeleteBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
