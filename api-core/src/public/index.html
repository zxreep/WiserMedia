<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF to CUET Quiz</title>
    <style>
      body { font-family: Inter, Arial, sans-serif; background: #f6f8fb; margin: 0; }
      .container { max-width: 760px; margin: 40px auto; background: white; padding: 24px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.08); }
      h1 { margin-top: 0; }
      label { display:block; margin-top: 12px; font-weight: 600; }
      input, select, button { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #d0d7e2; margin-top: 6px; }
      button { background: #2b65ff; border: none; color: white; font-weight: 700; cursor: pointer; margin-top: 16px; }
      button:disabled { opacity: .6; cursor: wait; }
      .status { margin-top: 14px; padding: 10px; border-radius: 8px; }
      .loading { background: #eef4ff; color: #1e4abf; }
      .success { background: #eafaf0; color: #147a37; }
      .error { background: #ffeef0; color: #b42318; }
      pre { background:#0f172a; color:#e2e8f0; padding:12px; overflow:auto; border-radius:8px; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>PDF → CUET Notes & Quiz</h1>
      <form id="quiz-form">
        <label>PDF File</label>
        <input id="pdf" type="file" accept="application/pdf" required />

        <label>Telegram Bot Token</label>
        <input id="botToken" placeholder="123456:ABC..." />

        <label>Telegram Chat ID</label>
        <input id="chatId" placeholder="-100123... or user id" />

        <label>AI API Key</label>
        <input id="aiApiKey" type="password" placeholder="sk-..." required />

        <label>Output Mode</label>
        <select id="outputMode">
          <option value="telegram">Telegram Polls</option>
          <option value="json">JSON output</option>
        </select>

        <button id="submitBtn" type="submit">Generate Quiz</button>
      </form>
      <div id="status"></div>
      <pre id="result"></pre>
    </div>

    <script>
      const storageKey = 'wm_pdf_quiz_creds_v1';
      const statusEl = document.getElementById('status');
      const resultEl = document.getElementById('result');
      const form = document.getElementById('quiz-form');
      const submitBtn = document.getElementById('submitBtn');

      const saved = JSON.parse(localStorage.getItem(storageKey) || '{}');
      for (const key of ['botToken', 'chatId', 'aiApiKey', 'outputMode']) {
        if (saved[key]) document.getElementById(key).value = saved[key];
      }

      const setStatus = (type, msg) => {
        statusEl.className = `status ${type}`;
        statusEl.textContent = msg;
      };

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const pdf = document.getElementById('pdf').files[0];
        const botToken = document.getElementById('botToken').value.trim();
        const chatId = document.getElementById('chatId').value.trim();
        const aiApiKey = document.getElementById('aiApiKey').value.trim();
        const outputMode = document.getElementById('outputMode').value;

        localStorage.setItem(storageKey, JSON.stringify({ botToken, chatId, aiApiKey, outputMode }));
        resultEl.textContent = '';

        if (!pdf) return setStatus('error', 'Please upload a PDF file.');
        if (!aiApiKey) return setStatus('error', 'AI API key is required.');
        if (outputMode === 'telegram' && (!botToken || !chatId)) {
          return setStatus('error', 'Telegram bot token and chat ID are required for Telegram mode.');
        }

        submitBtn.disabled = true;
        try {
          setStatus('loading', 'Uploading PDF...');
          const formData = new FormData();
          formData.append('file', pdf);
          const uploadRes = await fetch('/pdf-quiz/upload-pdf', { method: 'POST', body: formData });
          const uploadData = await uploadRes.json();
          if (!uploadRes.ok) throw new Error(uploadData.error || 'Upload failed');

          setStatus('loading', 'Processing chunks...');
          const processRes = await fetch('/pdf-quiz/process-pdf', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uploadId: uploadData.data.uploadId })
          });
          const processData = await processRes.json();
          if (!processRes.ok) throw new Error(processData.error || 'Process failed');

          setStatus('loading', 'Generating notes and CUET quiz...');
          const genRes = await fetch('/pdf-quiz/generate-quiz', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ uploadId: uploadData.data.uploadId, aiApiKey, outputMode, botToken, chatId })
          });
          const genData = await genRes.json();
          if (!genRes.ok) throw new Error(genData.error || 'Generation failed');

          setStatus('success', outputMode === 'telegram' ? 'Quiz generated and sent to Telegram.' : 'Quiz generated successfully.');
          resultEl.textContent = JSON.stringify(genData, null, 2);
        } catch (err) {
          setStatus('error', err.message || 'Something went wrong');
        } finally {
          submitBtn.disabled = false;
        }
      });
    </script>
  </body>
</html>
